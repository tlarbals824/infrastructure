# SealedSecret for n8n
#
# 아래 명령어로 시크릿을 생성하고 seal하세요:
#
#   kubectl create secret generic n8n-secrets \
#     --namespace n8n \
#     --from-literal=POSTGRES_PASSWORD='<your-db-password>' \
#     --from-literal=N8N_ENCRYPTION_KEY='<your-32-char-random-key>' \
#     --dry-run=client -o yaml | \
#   kubeseal --controller-name=sealed-secrets-controller \
#            --controller-namespace=kube-system \
#            --format yaml > k8s/apps/n8n/sealed-secret.yaml
#
# N8N_ENCRYPTION_KEY 생성 예시:
#   openssl rand -hex 16
#
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: n8n-secrets
  namespace: n8n
spec:
  encryptedData:
    POSTGRES_PASSWORD: <REPLACE_WITH_SEALED_VALUE>
    N8N_ENCRYPTION_KEY: <REPLACE_WITH_SEALED_VALUE>
  template:
    metadata:
      name: n8n-secrets
      namespace: n8n
